name: Merlin CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: merlin-linux-amd64
          - os: macos-latest
            artifact: merlin-darwin-arm64
          - os: windows-latest
            artifact: merlin-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install D Compiler
        uses: dlang-community/setup-dlang@v1
        with:
          compiler: ldc-latest

      - name: Compile Code
        run: make

      - name: Rename Binary (Unix)
        if: runner.os != 'Windows'
        run: mv bin/merlin bin/${{ matrix.artifact }}

      - name: Rename Binary (Windows)
        if: runner.os == 'Windows'
        run: Rename-Item -Path bin\merlin.exe -NewName ${{ matrix.artifact }}

      - name: Validate Binary Format (Linux)
        if: runner.os == 'Linux'
        run: |
          MAGIC=$(head -c 4 bin/${{ matrix.artifact }} | xxd -p)
          if [ "$MAGIC" != "7f454c46" ]; then
            echo "::error::Binary is not a valid ELF executable (magic: $MAGIC)"
            exit 1
          fi
          file bin/${{ matrix.artifact }}

      - name: Validate Binary Format (macOS)
        if: runner.os == 'macOS'
        run: |
          MAGIC=$(head -c 4 bin/${{ matrix.artifact }} | xxd -p)
          if [ "$MAGIC" != "cffa edfe" ] && [ "$MAGIC" != "cefa edfe" ] && [ "$MAGIC" != "feedfacf" ] && [ "$MAGIC" != "feedface" ]; then
            echo "::warning::Binary magic ($MAGIC) may not be standard Mach-O, verifying with file..."
          fi
          file bin/${{ matrix.artifact }}

      - name: Validate Binary Format (Windows)
        if: runner.os == 'Windows'
        run: |
          $bytes = [System.IO.File]::ReadAllBytes("bin\${{ matrix.artifact }}")
          $magic = "{0:X2}{1:X2}" -f $bytes[0], $bytes[1]
          if ($magic -ne "4D5A") {
            Write-Error "Binary is not a valid PE executable (magic: $magic)"
            exit 1
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bin/${{ matrix.artifact }}

      - name: Send Telemetry Payload
        env:
          RELAY_TOKEN: ${{ secrets.WAZUH_RELAY_TOKEN }}
        run: |
          curl -X POST "https://telemetry.yutila.com" \
            -H "Authorization: Bearer $RELAY_TOKEN" \
            -H "Content-Type: application/x-ndjson" \
            -d '{"event": "ci_pipeline_success", "run_id": "${{ github.run_id }}", "repo": "${{ github.repository }}", "platform": "${{ matrix.os }}"}'
        shell: bash

  trivy:
    name: SAST & File System Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Architecture
        uses: actions/checkout@v4

      - name: Execute Trivy Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'json'
          output: 'trivy-results.json'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Normalize Payload
        if: always()
        run: jq -c '.Results[]? | .Vulnerabilities[]?' trivy-results.json > payload.ndjson || touch payload.ndjson

      - name: Ingest Telemetry
        if: always()
        uses: yutila-org/WAZUH-TELEMETRY@main
        with:
          scan-file: 'payload.ndjson'
          relay-token: ${{ secrets.WAZUH_RELAY_TOKEN }}

  secret-scan:
    name: Secret Entropy Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Architecture
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Execute Gitleaks
        uses: gitleaks/gitleaks-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_REPORT_FORMAT: json
          GITLEAKS_REPORT_FILE: gitleaks-results.json

      - name: Normalize Payload
        if: always()
        run: jq -c '.[]?' gitleaks-results.json > payload.ndjson || touch payload.ndjson

      - name: Ingest Telemetry
        if: always()
        uses: yutila-org/WAZUH-TELEMETRY@main
        with:
          scan-file: 'payload.ndjson'
          relay-token: ${{ secrets.WAZUH_RELAY_TOKEN }}

  sbom:
    name: Software Bill of Materials
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Architecture
        uses: actions/checkout@v4

      - name: Execute Syft
        uses: anchore/sbom-action@v0
        with:
          format: 'spdx-json'
          output-file: 'sbom-results.json'

      - name: Normalize Payload
        if: always()
        run: jq -c '.packages[]?' sbom-results.json > payload.ndjson || touch payload.ndjson

      - name: Ingest Telemetry
        if: always()
        uses: yutila-org/WAZUH-TELEMETRY@main
        with:
          scan-file: 'payload.ndjson'
          relay-token: ${{ secrets.WAZUH_RELAY_TOKEN }}

  scorecard:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: OpenSSF Scorecard analysis
        uses: ossf/scorecard-action@v2.3.1
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

  deps-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate dependencies using deps.dev / OSV
        uses: google/osv-scanner-action/osv-scanner-action@v1.8.2

  release:
    name: Publish Release
    needs: [build, trivy, secret-scan]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/

      - name: Prepare Release Binaries
        run: |
          mkdir -p dist/
          for dir in release-assets/*/; do
            cp "$dir"* dist/
          done
          chmod +x dist/merlin-linux-amd64 dist/merlin-darwin-arm64 || true
          ls -la dist/
          echo "--- Binary format validation ---"
          file dist/* || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
